name: Deploy to S3

on:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "**/*.html"
      - "**/*.css"
      - "**/*.js"
      - "assets/**"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::236565801201:role/github-maimons-dev
          aws-region: us-east-1

      - name: Sync to S3
        run: |
          aws s3 sync . s3://www.maimons.dev \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --delete
